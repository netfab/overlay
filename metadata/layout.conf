# Specify the repository name (if there is a different setting in
# profiles/repo_name, then this layout.conf setting will take precedence)
repo-name = netfab-overlay

masters = gentoo


manifest-hashes = BLAKE2B SHA512
manifest-required-hashes = BLAKE2B
update-changelog = false
cache-formats = md5-dict

# Use thin Manifests for Git
thin-manifests = true

# # Sign Git commits, and NOT Manifests
sign-commits = true
sign-manifests = false

# Let's start with new EAPIs if possible
eapis-banned = 0 1 2 3 4 5 6
